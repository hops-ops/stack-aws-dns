apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: stack-aws-dns
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/helm-aws-external-dns
    version: '>=v0.4.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Configuration
    package: ghcr.io/hops-ops/helm-aws-cert-manager
    version: '>=v0.7.0'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-kubernetes
    version: '>=v1'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-aws-route53
    version: '>=v2'
  description: Deploys the DNS stack (ExternalDNS, CertManager, ClusterIssuer with
    Let's Encrypt DNS-01 Route53).
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # stack-aws-dns

    Deploys DNS and TLS automation: ExternalDNS, CertManager with
    ClusterIssuer (Let's Encrypt DNS-01 via Route53).
  repository: ghcr.io/hops-ops/stack-aws-dns
  source: github.com/hops-ops/stack-aws-dns
